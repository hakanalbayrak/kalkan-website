name: Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    # Deployment via GitHub Actions is temporarily disabled.
    # Current production deployment is managed by WP Pusher.
    if: ${{ false }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          name: id_kalkan_deploy
          known_hosts: unnecessary
          if_key_exists: replace

      - name: Start ssh-agent and unlock passphrase-protected key
        env:
          SSH_PASSPHRASE: ${{ secrets.SSH_PASSPHRASE }}
        run: |
          set -eu

          eval "$(ssh-agent -s)"
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"

          cat > /tmp/kalkan-ssh-askpass.sh <<'ASKPASS'
          #!/usr/bin/env sh
          printf '%s\n' "$SSH_PASSPHRASE"
          ASKPASS
          chmod 700 /tmp/kalkan-ssh-askpass.sh

          export SSH_ASKPASS=/tmp/kalkan-ssh-askpass.sh
          export DISPLAY=:0

          # setsid + SSH_ASKPASS prevents interactive passphrase prompts in CI.
          setsid ssh-add ~/.ssh/id_kalkan_deploy < /dev/null
          ssh-add -l

      - name: Verify SSH connection
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -eu

          ssh -o BatchMode=yes -o StrictHostKeyChecking=no -p "${SSH_PORT:-22}" "${SSH_USER}@${SSH_HOST}" "echo 'SSH connection established.'"

      - name: Deploy over SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -eu

          # Keep deployment commands in this SSH command block.
          ssh -o BatchMode=yes -o StrictHostKeyChecking=no -p "${SSH_PORT:-22}" "${SSH_USER}@${SSH_HOST}" "echo 'Deploy command executed over SSH.'"
